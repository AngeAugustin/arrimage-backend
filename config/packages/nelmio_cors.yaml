nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
        allow_methods: ['GET', 'OPTIONS', 'POST', 'PATCH']
        allow_headers: ['Content-Type']
        expose_headers: ['Content-Disposition', 'X-Export-Count']
        max_age: 3600
        allow_credentials: true
    paths:
        '^/api': ~
